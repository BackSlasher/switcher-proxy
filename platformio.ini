; PlatformIO configuration for Switcher Proxy
; Native environment for unit testing protocol logic on dev machine

[env:native]
platform = native
build_flags = -std=c++17
test_framework = unity
lib_deps =
build_src_filter = +<*> -<components/>

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps =
build_src_filter = +<*> -<test/>
